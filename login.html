<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — BiblioPrime</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body class="auth-page">

  <!-- HEADER SIMPLIFICADO -->
  <header style="background: var(--cor-primaria); padding: 1rem;">
    <div style="max-width: var(--max-width); margin: 0 auto;">
      <a href="index.html" class="logo" style="color: var(--cor-branco);">
        <span class="logo-icon">📚</span>
        <span>BiblioPrime</span>
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-logo">
        <a href="index.html">
          <span>📚</span>
          <span>LivroShelf</span>
        </a>
      </div>

      <div class="auth-box">
        <!-- ABAS -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
          <button class="auth-tab" onclick="switchAuthTab('register')">Criar conta</button>
        </div>

        <!-- FORM LOGIN -->
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">E-mail ou celular</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-input" placeholder="seu@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-input" placeholder="Digite sua senha" required>
            </div>
          </div>

          <div class="form-help">
            <label class="form-check">
              <input type="checkbox">
              <span>Lembrar de mim</span>
            </label>
            <a href="#" class="form-link">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-sign-in-alt"></i> Entrar
          </button>

          <div class="divider"><span>ou</span></div>

          <div class="social-login">
            <button type="button" class="btn-social">
              <i class="fab fa-google" style="color: #DB4437;"></i> Google
            </button>
            <button type="button" class="btn-social">
              <i class="fab fa-facebook-f" style="color: #4267B2;"></i> Facebook
            </button>
          </div>
        </form>

        <!-- FORM REGISTRO -->
        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Nome completo</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" class="form-input" placeholder="Seu nome" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">E-mail</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-input" placeholder="seu@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Celular</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-phone"></i>
              <input type="tel" class="form-input" placeholder="(11) 99999-9999">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Senha</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-input" placeholder="Mínimo 8 caracteres" 
                     required minlength="8" id="regPassword" oninput="checkStrength(this.value)">
            </div>
            <div class="password-strength" id="strengthBar">
              <div class="strength-bar" id="strengthFill"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar senha</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" class="form-input" placeholder="Repita a senha" required>
            </div>
          </div>

          <p class="terms-text">
            Ao criar uma conta, você concorda com os 
            <a href="#">Termos de Uso</a> e 
            <a href="#">Política de Privacidade</a> da LivroShelf.
          </p>

          <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-user-plus"></i> Criar conta
          </button>

          <div class="divider"><span>ou</span></div>

          <div class="social-login">
            <button type="button" class="btn-social">
              <i class="fab fa-google" style="color: #DB4437;"></i> Google
            </button>
            <button type="button" class="btn-social">
              <i class="fab fa-facebook-f" style="color: #4267B2;"></i> Facebook
            </button>
          </div>
        </form>
      </div>

      <div class="auth-footer">
        <p> LivroShelf. Todos os direitos reservados.</p>
        <p style="margin-top: 0.5rem;">
          <a href="#">Privacidade</a> | <a href="#">Termos</a> | <a href="#">Ajuda</a>
        </p>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tab + 'Form').classList.add('active');
    }

    function handleLogin(e) {
      e.preventDefault();
      // Simulação de login
      alert('Login realizado com sucesso! Redirecionando...');
      window.location.href = 'index.html';
    }

    function handleRegister(e) {
      e.preventDefault();
      // Simulação de registro
      alert('Conta criada com sucesso! Bem-vindo à LivroShelf.');
      window.location.href = 'index.html';
    }

    function checkStrength(password) {
      const bar = document.getElementById('strengthBar');
      const fill = document.getElementById('strengthFill');
      
      if (password.length === 0) {
        bar.classList.remove('show');
        return;
      }
      
      bar.classList.add('show');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;
      
      fill.className = 'strength-bar';
      if (strength <= 1) fill.classList.add('strength-weak');
      else if (strength === 2) fill.classList.add('strength-medium');
      else fill.classList.add('strength-strong');
    }
  </script>
</body>
</html>
